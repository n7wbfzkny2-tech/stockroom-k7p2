<!DOCTYPE html>
<html lang="zh-Hant"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AI 選股戰情室</title>
<style>
:root{
  --bg:#06080f; --bg-2:#0a0e1a; --panel:#0f1422; --panel-2:#161d2e;
  --line:#1f2940; --line-glow:#2a3a5c; --ink:#eaf1fb; --ink-dim:#7e8ca6;
  --up:#ff4d6d; --down:#16d6a3; --gold:#ffc94d; --cyan:#22d3ee;
  --accent:#4d7cff; --accent-2:#a855f7; --r:16px; --touch:56px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,"PingFang TC","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;}
body{min-height:100vh;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(77,124,255,.10), transparent 60%),
    radial-gradient(900px 500px at 0% 10%, rgba(168,85,247,.08), transparent 55%),
    linear-gradient(var(--bg), var(--bg-2));
  background-attachment:fixed;}
.wrap{max-width:1320px;margin:0 auto;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}

header{position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg, rgba(6,8,15,.95), rgba(6,8,15,.75));
  backdrop-filter:blur(20px);border-bottom:1px solid var(--line);padding:16px 22px 0;}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
h1{margin:0;font-size:25px;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
.logo-dot{width:11px;height:11px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 14px var(--cyan),0 0 4px #fff;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
h1 .grad{background:linear-gradient(90deg,var(--cyan),var(--accent),var(--accent-2));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.gear{width:46px;height:46px;border:1px solid var(--line);background:var(--panel-2);
  border-radius:12px;color:var(--ink);font-size:20px;cursor:pointer;transition:.15s;}
.gear:active{transform:scale(.92);}

.tabs{display:flex;gap:4px;margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{flex:1 1 0;min-height:52px;padding:0 12px;border:none;background:transparent;
  color:var(--ink-dim);font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .18s;}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);text-shadow:0 0 12px rgba(34,211,238,.4);}

main{padding:18px;}
@media(max-width:480px){
  main{padding:14px;}
  header{padding:14px 16px 0;}
  h1{font-size:22px;}
  .card{padding:16px;}
  .name{font-size:20px;}
}

.btn{min-height:var(--touch);border:none;border-radius:14px;font-size:18px;font-weight:700;
  cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform .12s,box-shadow .2s;width:100%;}
.btn:active{transform:scale(.98);}
.btn-primary{background:linear-gradient(100deg,var(--accent),var(--accent-2));
  box-shadow:0 0 0 1px rgba(77,124,255,.5),0 10px 30px rgba(77,124,255,.35);}
.btn:disabled{opacity:.5;cursor:default;box-shadow:none;}
.btn-ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);}

.search-row{display:flex;gap:12px;margin-bottom:20px;}
.search-input{flex:1;min-height:var(--touch);background:var(--panel);border:1px solid var(--line);
  border-radius:14px;padding:0 18px;color:var(--ink);font-size:18px;font-variant-numeric:tabular-nums;}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(77,124,255,.18);}
.search-input::placeholder{color:var(--ink-dim);}
.search-row .btn{width:auto;padding:0 26px;flex-shrink:0;}

.panel{background:linear-gradient(160deg, rgba(22,29,46,.6), rgba(15,20,34,.6));
  border:1px solid var(--line);border-radius:var(--r);box-shadow:inset 0 1px 0 rgba(255,255,255,.03);}
.scan-controls{padding:18px;margin-bottom:20px;}
.scan-controls .label{font-size:13px;color:var(--ink-dim);margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;}
.chip-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.chip{min-height:46px;padding:0 18px;border-radius:12px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--ink-dim);font-size:15px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all .15s;}
.chip.on{background:linear-gradient(120deg,rgba(77,124,255,.2),rgba(168,85,247,.15));
  border-color:var(--accent);color:#fff;box-shadow:0 0 16px rgba(77,124,255,.25);}

.progress{display:none;padding:24px;text-align:center;margin-bottom:20px;}
.progress.show{display:block;}
.bar{height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;margin:16px 0 10px;}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--accent),var(--accent-2));
  box-shadow:0 0 12px rgba(77,124,255,.6);transition:width .3s;}
.progress .ptxt{font-size:14px;color:var(--ink-dim);}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(34,211,238,.25);
  border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.grid{display:grid;gap:14px;grid-template-columns:1fr;}
@media(min-width:720px){ .grid{grid-template-columns:1fr 1fr;} }
@media(min-width:1120px){ .grid{grid-template-columns:1fr 1fr 1fr;} }

.card{position:relative;padding:18px;cursor:pointer;overflow:hidden;
  background:linear-gradient(160deg, rgba(22,29,46,.55), rgba(15,20,34,.7));
  border:1px solid var(--line);border-radius:var(--r);
  transition:transform .15s,border-color .15s,box-shadow .2s;}
.card:active{transform:scale(.985);}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.6;}
.card.hot::before{background:linear-gradient(var(--up),var(--gold));opacity:1;box-shadow:0 0 14px var(--up);}
.card.hot{border-color:rgba(255,77,109,.35);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.sid{font-size:13px;color:var(--ink-dim);letter-spacing:.5px;}
.name{font-size:21px;font-weight:800;margin-top:2px;}
.cat-tag{font-size:12px;color:var(--cyan);margin-top:3px;}
.badge{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;letter-spacing:.5px;}
.badge.hot{background:rgba(255,77,109,.16);color:var(--up);border:1px solid rgba(255,77,109,.3);}
.badge.good{background:rgba(255,201,77,.14);color:var(--gold);border:1px solid rgba(255,201,77,.3);}
.badge.rev{background:rgba(34,211,238,.14);color:var(--cyan);border:1px solid rgba(34,211,238,.3);}

.score-bar{display:flex;align-items:center;gap:10px;margin-top:14px;}
.score-bar .num{font-size:30px;font-weight:800;line-height:1;}
.score-bar .track{flex:1;height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;}
.score-bar .fl{height:100%;border-radius:3px;}

.ind-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
.ind{font-size:12px;padding:5px 9px;border-radius:8px;background:var(--panel-2);color:var(--ink-dim);border:1px solid var(--line);}
.ind.pos{color:var(--up);border-color:rgba(255,77,109,.25);}
.ind.neg{color:var(--down);border-color:rgba(22,214,163,.25);}

.empty{grid-column:1/-1;text-align:center;color:var(--ink-dim);padding:60px 20px;font-size:16px;line-height:1.8;}

.cat-grid{display:grid;gap:12px;grid-template-columns:repeat(2,1fr);}
@media(min-width:600px){ .cat-grid{grid-template-columns:repeat(3,1fr);} }
@media(min-width:960px){ .cat-grid{grid-template-columns:repeat(4,1fr);} }
.cat-card{padding:18px 16px;cursor:pointer;text-align:left;
  background:linear-gradient(160deg, rgba(22,29,46,.5), rgba(15,20,34,.7));
  border:1px solid var(--line);border-radius:14px;transition:.15s;}
.cat-card:active{transform:scale(.97);}
.cat-card:hover{border-color:var(--accent);box-shadow:0 0 18px rgba(77,124,255,.2);}
.cat-icon{font-size:30px;}
.cat-name{font-size:18px;font-weight:800;margin-top:8px;}
.cat-desc{font-size:13px;color:var(--ink-dim);margin-top:3px;}
.cat-count{font-size:12px;color:var(--cyan);margin-top:8px;}

.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.back-btn{min-height:44px;padding:0 16px;border:1px solid var(--line);background:var(--panel-2);
  color:var(--ink);border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.back-title{font-size:22px;font-weight:800;}

.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  z-index:40;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-bg.open{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:linear-gradient(180deg, #121829, #0c111d);
  border-radius:22px 22px 0 0;border-top:1px solid var(--line-glow);
  box-shadow:0 -20px 60px rgba(0,0,0,.6);
  padding:14px 24px calc(40px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);
  max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;pointer-events:none;}
.sheet.open{transform:translateY(0);pointer-events:auto;}
@media(min-width:720px){
  .sheet{left:50%;right:auto;bottom:auto;top:50%;width:640px;
    transform:translate(-50%,-46%) scale(.96);border-radius:20px;
    opacity:0;border:1px solid var(--line-glow);max-height:88vh;pointer-events:none;}
  .sheet.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
}
.grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:4px auto 14px;}
@media(min-width:720px){ .grab{display:none;} }
.sheet h2{margin:0;font-size:25px;}
.sheet .sub{color:var(--ink-dim);font-size:14px;margin:4px 0 18px;}

.sec-title{font-size:13px;color:var(--cyan);margin:22px 0 10px;letter-spacing:1.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(min-width:720px){ .ind-grid{grid-template-columns:1fr 1fr 1fr 1fr;} }
.ind-box{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;}
.ind-box .k{font-size:12px;color:var(--ink-dim);}
.ind-box .v{font-size:17px;font-weight:700;margin-top:3px;}

.ai-box{background:linear-gradient(160deg,rgba(77,124,255,.1),rgba(168,85,247,.05));
  border:1px solid rgba(77,124,255,.25);border-radius:14px;padding:18px;margin-top:6px;
  font-size:15px;line-height:1.8;white-space:pre-wrap;}
.ai-box.loading{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--ink-dim);min-height:110px;}

.chain-wrap{margin-top:6px;}
.chain-note{font-size:13px;color:var(--ink-dim);line-height:1.7;background:var(--panel-2);
  border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:14px;}
.chain-tier{margin-bottom:14px;}
.chain-label{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.chain-label.up{color:var(--cyan);}
.chain-label.self{color:var(--gold);}
.chain-label.down{color:var(--up);}
.chain-items{display:flex;flex-wrap:wrap;gap:8px;}
.chain-item{padding:9px 13px;border-radius:11px;cursor:pointer;background:var(--panel-2);
  border:1px solid var(--line);transition:.15s;display:flex;flex-direction:column;gap:2px;min-width:0;}
.chain-item:active{transform:scale(.96);}
.chain-item:hover{border-color:var(--accent);}
.chain-item .ci-name{font-size:15px;font-weight:700;}
.chain-item .ci-rel{font-size:11px;color:var(--ink-dim);}
.chain-self{padding:11px 15px;border-radius:11px;
  background:linear-gradient(120deg,rgba(255,201,77,.15),rgba(255,201,77,.06));
  border:1px solid rgba(255,201,77,.35);font-size:16px;font-weight:800;color:var(--gold);}
.chain-arrow{text-align:center;color:var(--ink-dim);font-size:18px;margin:2px 0;}

.close-btn{width:100%;min-height:var(--touch);margin-top:22px;border:1px solid var(--line);
  border-radius:14px;background:var(--panel-2);color:var(--ink);font-size:18px;font-weight:700;cursor:pointer;}
.disclaimer{margin-top:16px;font-size:12px;color:var(--ink-dim);line-height:1.6;text-align:center;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:60;
  display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:linear-gradient(180deg,#121829,#0c111d);border:1px solid var(--line-glow);
  border-radius:18px;padding:26px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal h3{margin:0 0 6px;font-size:21px;}
.modal p{color:var(--ink-dim);font-size:14px;line-height:1.6;margin:0 0 18px;}
.modal label{display:block;font-size:14px;color:var(--ink-dim);margin:14px 0 8px;}
.modal input{width:100%;min-height:50px;background:var(--panel-2);border:1px solid var(--line);
  border-radius:11px;padding:0 14px;color:var(--ink);font-size:16px;}
.modal input:focus{outline:none;border-color:var(--accent);}
.modal .hint{font-size:12px;color:var(--ink-dim);margin-top:8px;line-height:1.5;}
.modal .row-btn{display:flex;gap:12px;margin-top:22px;}

.toast{position:fixed;top:84px;left:50%;transform:translateX(-50%) translateY(-120px);
  background:var(--panel-2);border:1px solid var(--line-glow);color:var(--ink);
  padding:13px 20px;border-radius:13px;font-size:14px;z-index:80;opacity:0;max-width:90%;
  text-align:center;transition:all .3s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ===== 未來科技感升級 ===== */
/* 動態網格背景 */
.grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(77,124,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,124,255,.04) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 30%, transparent 75%);
  animation:gridfloat 20s linear infinite;}
@keyframes gridfloat{0%{background-position:0 0;}100%{background-position:44px 44px;}}
.wrap{position:relative;z-index:1;}

/* LIVE 徽章 */
.live-badge{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;
  background:rgba(22,214,163,.1);border:1px solid rgba(22,214,163,.35);
  color:var(--down);font-size:13px;font-weight:800;letter-spacing:1.5px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--down);
  box-shadow:0 0 10px var(--down);animation:pulse 1.6s infinite;}

/* 標題加強發光 */
h1 .grad{filter:drop-shadow(0 0 16px rgba(77,124,255,.5));}

/* 主按鈕掃描光效 */
.btn-primary{position:relative;overflow:hidden;}
.btn-primary::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:sweep 3s ease-in-out infinite;}
@keyframes sweep{0%{left:-100%;}50%,100%{left:160%;}}

/* 卡片 hover 光暈加強 */
.card{backdrop-filter:blur(4px);}
.card.hot{box-shadow:0 0 0 1px rgba(255,77,109,.2),0 6px 30px rgba(255,77,109,.12);}
.card:hover{box-shadow:0 0 0 1px rgba(77,124,255,.3),0 6px 30px rgba(77,124,255,.15);}

/* 評分數字發光 */
.score-bar .num{text-shadow:0 0 18px currentColor;}
.score-bar .fl{box-shadow:0 0 12px currentColor;}

/* 分頁 active 底線發光加強 */
.tab.active{position:relative;}
.tab.active::after{content:"";position:absolute;left:20%;right:20%;bottom:-2px;height:2px;
  background:var(--cyan);box-shadow:0 0 12px var(--cyan);border-radius:2px;}

/* 面板邊框微光 */
.panel{position:relative;}
.panel::before{content:"";position:absolute;inset:0;border-radius:var(--r);padding:1px;
  background:linear-gradient(160deg,rgba(77,124,255,.3),transparent 40%,transparent 60%,rgba(168,85,247,.2));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}

/* 詳情頭部 + 自選按鈕 */
.sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.watch-btn{flex-shrink:0;min-height:42px;padding:0 16px;border-radius:11px;
  border:1px solid var(--line-glow);background:var(--panel-2);color:var(--ink);
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.watch-btn:active{transform:scale(.95);}
.watch-btn.on{background:rgba(255,201,77,.15);border-color:var(--gold);color:var(--gold);}

/* 自選卡片刪除鈕 */
.card .del-btn{position:absolute;top:14px;right:14px;width:30px;height:30px;
  border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.3);
  color:var(--ink-dim);font-size:16px;cursor:pointer;z-index:5;
  display:flex;align-items:center;justify-content:center;}
.card .del-btn:active{transform:scale(.9);color:var(--up);border-color:var(--up);}

/* 大類卡片（更醒目） */
.cat-card.super{background:linear-gradient(160deg, rgba(77,124,255,.12), rgba(168,85,247,.06));
  border-color:var(--line-glow);}
.cat-card.super .cat-name{font-size:20px;}
.cat-card.super .cat-icon{font-size:34px;}

/* 子返回列（橫跨整排）*/
.sub-back-row{grid-column:1/-1;display:flex;align-items:center;gap:14px;margin-bottom:4px;}
.sub-back-title{font-size:19px;font-weight:800;}

/* 大盤紅綠燈徽章 */
.live-badge{cursor:pointer;transition:.15s;}
.live-badge:active{transform:scale(.95);}
.live-badge.mk-green{background:rgba(22,214,163,.12);border-color:rgba(22,214,163,.4);color:var(--down);}
.live-badge.mk-red{background:rgba(255,77,109,.12);border-color:rgba(255,77,109,.4);color:var(--up);}
.live-badge.mk-yellow{background:rgba(255,201,77,.12);border-color:rgba(255,201,77,.4);color:var(--gold);}

/* 順勢/逆勢標記 */
.trend-flag{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;margin-left:6px;}
.trend-flag.with{background:rgba(22,214,163,.15);color:var(--down);}
.trend-flag.against{background:rgba(255,77,109,.15);color:var(--up);}

/* 籌碼區 */
.chip-net{font-weight:800;}
.chip-net.buy{color:var(--up);}
.chip-net.sell{color:var(--down);}

/* ===== 自選名單頁重排 ===== */
.watch-controls{padding:18px;margin-bottom:16px;}
.watch-controls .label{font-size:13px;color:var(--ink-dim);margin-bottom:10px;
  letter-spacing:.5px;text-transform:uppercase;}
/* 輸入＋加入：輸入框自適應、按鈕固定寬，不溢出 */
.watch-add-row{display:flex;gap:10px;margin-bottom:12px;}
.watch-add-row .search-input{flex:1 1 auto;min-width:0;}
.watch-add-btn{flex:0 0 auto;width:auto;padding:0 22px;white-space:nowrap;}
/* 自選股數提示 */
.watch-count{font-size:13px;color:var(--ink-dim);margin:0 4px 12px;}
.watch-count b{color:var(--cyan);font-weight:800;}

/* 自選卡片：刪除鈕右上角，徽章與產業標籤同一行放名稱下方 */
#watchGrid .card .del-btn{top:14px;right:14px;left:auto;}
.watch-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px;}
.watch-meta .cat-tag{margin-top:0;}

/* K 線圖 */
.k-chart{background:#0a0e1a;border:1px solid var(--line);border-radius:12px;
  padding:8px;overflow:hidden;}
.k-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;padding:0 2px;

const MY_GEMINI_KEY  = "";   // ← 貼上 Gemini key，例如 "AIzaSyXXXX..."

/* ---------- 設定存取 ---------- */
const Store = {
  get(k, d=""){ try{ return localStorage.getItem(k) ?? d; }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem(k, v); }catch(e){} },

/* ---------- 技術指標引擎 ---------- */
const TA = {
  // 指數移動平均
  ema(values, period){
    const k = 2/(period+1);
    let ema = values[0];
    const out = [ema];
    for(let i=1;i<values.length;i++){
      ema = values[i]*k + ema*(1-k);
      out.push(ema);
    }
    return out;
  },

  // 簡單移動平均
  sma(values, period){
    const out = [];
    for(let i=0;i<values.length;i++){
      if(i<period-1){ out.push(null); continue; }
      let s=0; for(let j=i-period+1;j<=i;j++) s+=values[j];
      out.push(s/period);
    }
    return out;
  },

  // MACD(12,26,9)：回傳 DIF、MACD(訊號線)、柱狀體 OSC，及是否剛黃金交叉
  macd(closes, fast=12, slow=26, signal=9){
    if(closes.length < slow+signal) return null;
    const emaFast = this.ema(closes, fast);
    const emaSlow = this.ema(closes, slow);
    const dif = closes.map((_,i)=> emaFast[i]-emaSlow[i]);
    const dea = this.ema(dif, signal);          // 訊號線
    const osc = dif.map((d,i)=> d-dea[i]);       // 柱狀體
    const n = closes.length-1;
    const goldenCross = osc[n] > 0 && osc[n-1] <= 0;   // 由負翻正＝黃金交叉
    const deadCross   = osc[n] < 0 && osc[n-1] >= 0;
    return {
      dif: dif[n], dea: dea[n], osc: osc[n],
      goldenCross, deadCross,
      oscRising: osc[n] > osc[n-1],
    };
  },

  // RSI(14)
  rsi(closes, period=14){
    if(closes.length < period+1) return null;
    let gain=0, loss=0;
    for(let i=1;i<=period;i++){
      const d = closes[i]-closes[i-1];
      if(d>=0) gain+=d; else loss-=d;
    }
    gain/=period; loss/=period;
    for(let i=period+1;i<closes.length;i++){
      const d = closes[i]-closes[i-1];
      gain = (gain*(period-1) + (d>0?d:0))/period;
      loss = (loss*(period-1) + (d<0?-d:0))/period;
    }
    if(loss===0) return 100;
    const rs = gain/loss;
    return 100 - 100/(1+rs);
  },

  // KD 隨機指標(9,3,3)
  kd(highs, lows, closes, n=9){
    if(closes.length < n) return null;
    let k=50, d=50;
    for(let i=n-1;i<closes.length;i++){
      const hh = Math.max(...highs.slice(i-n+1,i+1));
      const ll = Math.min(...lows.slice(i-n+1,i+1));
      const rsv = hh===ll ? 50 : (closes[i]-ll)/(hh-ll)*100;
      k = k*2/3 + rsv/3;
      d = d*2/3 + k/3;
    }
    return { k, d, goldenCross: k>d, lowZone: k<30 };
  },

  // 布林通道(20,2)
  boll(closes, period=20, mult=2){
    if(closes.length < period) return null;
    const slice = closes.slice(-period);
    const mid = slice.reduce((a,b)=>a+b,0)/period;
    const variance = slice.reduce((a,b)=>a+(b-mid)**2,0)/period;
    const sd = Math.sqrt(variance);
    const last = closes[closes.length-1];
    return {
      mid, upper: mid+mult*sd, lower: mid-mult*sd,
      // 位置：0=下軌, 1=上軌
      pctB: (last-(mid-mult*sd))/((mid+mult*sd)-(mid-mult*sd)),
    };
  },

  // 量能：當日量 vs 20日均量
  volumeRatio(volumes, period=20){
    if(volumes.length < period+1) return null;
    const recent = volumes.slice(-period-1,-1);
    const avg = recent.reduce((a,b)=>a+b,0)/period;
    const today = volumes[volumes.length-1];
    return avg===0 ? null : today/avg;
  },

  // 均線多頭排列：MA5 > MA20 > MA60
  maAlignment(closes){
    const ma5 = this.sma(closes,5).at(-1);
    const ma20 = this.sma(closes,20).at(-1);
    const ma30 = this.sma(closes,30).at(-1);
    const ma60 = this.sma(closes,60).at(-1);
    if(ma5==null||ma20==null||ma60==null) return null;
    const last = closes.at(-1);
    return {
      ma5, ma20, ma30, ma60,
      bullish: ma5>ma20 && ma20>ma60,
      aboveAll: last>ma5 && last>ma20 && last>ma60,
    };
  },

  // 近 N 日漲跌幅
  changePct(closes, days=1){
    if(closes.length < days+1) return null;
    return (closes.at(-1)/closes.at(-1-days) - 1)*100;
  },

  // 突破：今日收盤是否創近 N 日新高
  breakout(closes, n=20){
    if(closes.length < n+1) return false;
    const prev = closes.slice(-n-1,-1);
    return closes.at(-1) > Math.max(...prev);
  },
};

/* ---------- 資料抓取（FinMind）---------- */
const FINMIND = "https://api.finmindtrade.com/api/v4/data";

/* 股價快取：復盤用收盤資料，同一天抓過就存著，跨開關都有效，大幅省額度 */
const priceMemCache={};  // 記憶體快取（本次工作階段）
function todayTag(){ return new Date().toISOString().slice(0,10); }
function loadPriceCache(id){
  if(priceMemCache[id]) return priceMemCache[id];
  try{
    const raw=localStorage.getItem("pc_"+id);
    if(raw){ const o=JSON.parse(raw);
      if(o.day===todayTag()){ priceMemCache[id]=o.data; return o.data; } }
  }catch(e){}
  return null;
}
function savePriceCache(id,data){
  priceMemCache[id]=data;
  try{ localStorage.setItem("pc_"+id, JSON.stringify({day:todayTag(),data})); }catch(e){}
}

async function fetchPrice(stockId, days=200){
  // 先查快取（復盤資料當天不變，省額度又快）
  const cached=loadPriceCache(stockId);
  if(cached) return cached;

  const end = new Date();
  const start = new Date(end - days*24*3600*1000);
  const fmt = d => d.toISOString().slice(0,10);
  const params = new URLSearchParams({
    dataset:"TaiwanStockPrice", data_id:stockId, start_date:fmt(start),
  });
  const tok = finmindToken(); if(tok) params.append("token", tok);
  const r = await fetch(`${FINMIND}?${params}`);
  if(r.status===402 || r.status===429){
    throw new Error(tok ? "資料額度暫時用盡，請稍後再試。" : "技術分析需要 FinMind token（免費）。請在程式碼最上方填入 MY_FINMIND_TOKEN。");
  }
  if(!r.ok) throw new Error(`資料抓取失敗 (${r.status})`);
  const j = await r.json();
  if(j.status!==200 || !j.data || !j.data.length){
    if(!tok) throw new Error("技術分析需要 FinMind token（免費）。請在程式碼最上方填入 MY_FINMIND_TOKEN，即可看 MACD/RSI/KD 與 AI 判斷。");
    throw new Error(j.msg || "查無此股票資料");
  }
  const rows = j.data.sort((a,b)=> a.date<b.date?-1:1);
  const data={
    dates:rows.map(r=>r.date), closes:rows.map(r=>r.close),
    highs:rows.map(r=>r.max), lows:rows.map(r=>r.min),
    opens:rows.map(r=>r.open), volumes:rows.map(r=>r.Trading_Volume),
  };
  savePriceCache(stockId, data);
  return data;
}

function judgeMarket(closes){
  if(!closes||closes.length<60) return null;
  const last=closes.at(-1);
  const ma20=closes.slice(-20).reduce((a,b)=>a+b,0)/20;
  const ma60=closes.slice(-60).reduce((a,b)=>a+b,0)/60;
  const chg=(last/closes.at(-2)-1)*100;
  let light,label,advice;
  if(last>ma20 && ma20>ma60){ light="green"; label="偏多"; advice="順勢可積極，飆股勝率較高"; }
  else if(last<ma60){ light="red"; label="偏空"; advice="逆勢保守，飆股訊號易失敗，建議減碼觀望"; }
  else { light="yellow"; label="中性"; advice="多空交戰，留意方向，控制部位"; }
  return {light,label,advice,last,ma20,ma60,chg};
}

function analyzeInstitutional(rows){
  if(!rows||!rows.length) return null;
  const byDate={};
  rows.forEach(r=>{
    const net=(r.buy-r.sell)/1000;
    if(!byDate[r.date]) byDate[r.date]={foreign:0,invest:0,dealer:0,total:0};
    const name=(r.name||"").toLowerCase();
    if(name.includes("foreign")) byDate[r.date].foreign+=net;
    else if(name.includes("investment")||name.includes("trust")) byDate[r.date].invest+=net;
    else if(name.includes("dealer")) byDate[r.date].dealer+=net;
    byDate[r.date].total+=net;
  });
  const dates=Object.keys(byDate).sort();
  if(!dates.length) return null;
  const latest=byDate[dates.at(-1)];
  let streak=0;
  for(let i=dates.length-1;i>=0;i--){
    const t=byDate[dates[i]].total;
    if(t>0&&streak>=0)streak++;
    else if(t<0&&streak<=0)streak--;
    else break;
  }
  const last5=dates.slice(-5);
  const foreign5=last5.reduce((s,d)=>s+byDate[d].foreign,0);
  const invest5=last5.reduce((s,d)=>s+byDate[d].invest,0);
  return {foreignToday:latest.foreign,investToday:latest.invest,totalToday:latest.total,streak,foreign5,invest5};
}

/* ---------- 計算指標 ---------- */
function computeIndicators(p){
  const closes=p.closes, highs=p.highs, lows=p.lows, vols=p.volumes;
  const last=closes.at(-1);
  const ma=TA.maAlignment(closes);
  const boll=TA.boll(closes);

  // 52週（約240日）高低點與距離
  const win=Math.min(240, closes.length);
  const hi52=Math.max(...highs.slice(-win));
  const lo52=Math.min(...lows.slice(-win));
  const fromHigh=(last/hi52-1)*100;   // 距52週高 %（負值=低於高點）
  const fromLow=(last/lo52-1)*100;    // 距52週低 %

  // 近20日振幅（平均單日高低差%），看這檔多會跳
  let ampSum=0,ampN=0;
  for(let i=Math.max(1,closes.length-20);i<closes.length;i++){
    if(closes[i-1]>0){ ampSum+=(highs[i]-lows[i])/closes[i-1]*100; ampN++; }
  }
  const amplitude=ampN?ampSum/ampN:null;

  // 連續上漲/下跌天數
  let streak=0;
  for(let i=closes.length-1;i>0;i--){
    const up=closes[i]>closes[i-1], dn=closes[i]<closes[i-1];
    if(up&&streak>=0)streak++;
    else if(dn&&streak<=0)streak--;
    else break;
  }

  // 關鍵價位：支撐用 MA20/布林下軌/前低，壓力用前高/布林上軌
  const ma20=ma?ma.ma20:null;
  const recentLow=Math.min(...lows.slice(-20));
  const recentHigh=Math.max(...highs.slice(-20));
  const support = ma20 ? Math.max(ma20*0.99, recentLow) : recentLow;  // 取較近的支撐
  const resistance = boll ? Math.min(boll.upper, recentHigh*1.0) : recentHigh;
  const stopLoss = last*0.93;  // 參考停損：-7%（常見紀律）
  const stopLossMA = ma20;     // 或跌破月線

  return {
    macd:TA.macd(closes), rsi:TA.rsi(closes),
    kd:TA.kd(highs,lows,closes), boll, ma, volR:TA.volumeRatio(vols),
    chg1:TA.changePct(closes,1), chg5:TA.changePct(closes,5),
    chg20:TA.changePct(closes,20),
    breakout:TA.breakout(closes,20), lastClose:last,
    hi52, lo52, fromHigh, fromLow, amplitude, streak,
    support, resistance, stopLoss, stopLossMA, recentLow, recentHigh,
    // 原始 OHLCV 給 K 線圖用
    _ohlc:{dates:p.dates, opens:p.opens, highs, lows, closes, vols},
  };
}

/* ---------- K 線圖（純 SVG，含 MA5/20/30/60 + 成交量）---------- */
const MA_COLORS={5:"#ffffff",20:"#ffc94d",30:"#22d3ee",60:"#a855f7"};
function buildKChart(ohlc, days=60){
  if(!ohlc||!ohlc.closes||ohlc.closes.length<5) return `<div class="chain-note">無足夠資料繪製K線圖。</div>`;
  const N=ohlc.closes.length;
  const start=Math.max(0, N-days);
  const idx=[];for(let i=start;i<N;i++)idx.push(i);
  const O=ohlc.opens, H=ohlc.highs, L=ohlc.lows, C=ohlc.closes, V=ohlc.vols;

  // 計算各均線（用完整資料算，只取顯示區間）
  const sma=(p)=>{const out=[];for(let i=0;i<N;i++){if(i<p-1){out.push(null);continue;}let s=0;for(let j=i-p+1;j<=i;j++)s+=C[j];out.push(s/p);}return out;};
  const MAs={5:sma(5),20:sma(20),30:sma(30),60:sma(60)};

  // 畫布尺寸
  const W=680, priceH=240, volH=60, gap=10, padL=8, padR=54, padT=8;
  const plotW=W-padL-padR;
  const totalH=priceH+gap+volH+padT*2;
  const n=idx.length;
  const cw=plotW/n;            // 每根寬度
  const bw=Math.max(1.5, cw*0.62);  // 蠟燭實體寬

  // 價格範圍（含均線）
  let pMin=Infinity,pMax=-Infinity;
  idx.forEach(i=>{ pMin=Math.min(pMin,L[i]); pMax=Math.max(pMax,H[i]); });
  [5,20,30,60].forEach(p=>idx.forEach(i=>{const v=MAs[p][i];if(v!=null){pMin=Math.min(pMin,v);pMax=Math.max(pMax,v);}}));
  const pPad=(pMax-pMin)*0.06||1; pMin-=pPad; pMax+=pPad;
  const yP=v=>padT+priceH-(v-pMin)/(pMax-pMin)*priceH;

  // 量範圍
  let vMax=0; idx.forEach(i=>vMax=Math.max(vMax,V[i]||0));
  const volTop=padT+priceH+gap;
  const yV=v=>volTop+volH-(v/(vMax||1))*volH;

  const xAt=k=>padL+k*cw+cw/2;
  const UP="#ff4d6d", DN="#16d6a3"; // 台股紅漲綠跌

  let svg=`<svg viewBox="0 0 ${W} ${totalH}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">`;
  // 背景格線（價格 4 條）
  for(let g=0;g<=4;g++){
    const y=padT+priceH*g/4; const val=pMax-(pMax-pMin)*g/4;
    svg+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+plotW}" y2="${y.toFixed(1)}" stroke="#1f2940" stroke-width="0.5"/>`;
    svg+=`<text x="${padL+plotW+4}" y="${(y+3).toFixed(1)}" fill="#7e8ca6" font-size="10">${val.toFixed(1)}</text>`;
  }
  // 蠟燭 + 量
  idx.forEach((i,k)=>{
    const x=xAt(k); const up=C[i]>=O[i]; const col=up?UP:DN;
    // 影線
    svg+=`<line x1="${x.toFixed(1)}" y1="${yP(H[i]).toFixed(1)}" x2="${x.toFixed(1)}" y2="${yP(L[i]).toFixed(1)}" stroke="${col}" stroke-width="1"/>`;
    // 實體
    const yo=yP(O[i]), yc=yP(C[i]); const top=Math.min(yo,yc), bh=Math.max(1,Math.abs(yc-yo));
    svg+=`<rect x="${(x-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`;
    // 量
    svg+=`<rect x="${(x-bw/2).toFixed(1)}" y="${yV(V[i]||0).toFixed(1)}" width="${bw.toFixed(1)}" height="${(volTop+volH-yV(V[i]||0)).toFixed(1)}" fill="${col}" opacity="0.45"/>`;
  });
  // 均線
  [5,20,30,60].forEach(p=>{
    let d="";let started=false;
    idx.forEach((i,k)=>{const v=MAs[p][i];if(v==null)return;const x=xAt(k),y=yP(v);d+=(started?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";started=true;});
    if(d)svg+=`<path d="${d}" fill="none" stroke="${MA_COLORS[p]}" stroke-width="1.3" opacity="0.95"/>`;
  });
  svg+=`</svg>`;

  // 圖例
  const legend=`<div class="k-legend">
    <span style="color:${MA_COLORS[5]}">━ MA5</span>
    <span style="color:${MA_COLORS[20]}">━ MA20</span>
    <span style="color:${MA_COLORS[30]}">━ MA30</span>
    <span style="color:${MA_COLORS[60]}">━ MA60</span>
    <span style="color:#7e8ca6">｜近${n}日</span></div>`;
  return `<div class="k-chart">${svg}</div>${legend}`;
}
function scoreHot(ind){
  let s=0; const reasons=[];
  if(ind.volR&&ind.volR>=1.8){s+=2;reasons.push(`帶量(${ind.volR.toFixed(1)}倍)`);}
  else if(ind.volR&&ind.volR>=1.3){s+=1;reasons.push("量增");}
  if(ind.breakout){s+=2;reasons.push("突破20日高");}
  if(ind.macd&&ind.macd.goldenCross){s+=2;reasons.push("MACD金叉");}
  else if(ind.macd&&ind.macd.oscRising&&ind.macd.osc>0){s+=1;reasons.push("MACD轉強");}
  if(ind.ma&&ind.ma.bullish&&ind.ma.aboveAll){s+=1.5;reasons.push("均線多頭");}
  if(ind.kd&&ind.kd.goldenCross&&ind.kd.k<70){s+=1;reasons.push("KD轉強");}
  if(ind.rsi&&ind.rsi>50&&ind.rsi<78){s+=0.5;}
  if(ind.rsi&&ind.rsi>=85){s-=1;reasons.push("RSI過熱");}
  return {score:Math.max(0,s),reasons,max:10};
}
function scoreQuality(ind){
  let s=0; const reasons=[];
  if(ind.ma&&ind.ma.bullish){s+=2;reasons.push("長期均線多頭");}
  if(ind.ma&&ind.ma.aboveAll){s+=1;reasons.push("站上所有均線");}
  if(ind.macd&&ind.macd.osc>0){s+=1.5;reasons.push("MACD多方");}
  if(ind.rsi&&ind.rsi>=45&&ind.rsi<=68){s+=1.5;reasons.push("RSI健康");}
  if(ind.boll&&ind.boll.pctB>0.4&&ind.boll.pctB<0.85){s+=1;reasons.push("布林中上軌");}
  if(ind.chg5!=null&&ind.chg5>0&&ind.chg5<15){s+=1;reasons.push("穩步上漲");}
  return {score:Math.max(0,s),reasons,max:8};
}
function scoreReversal(ind){
  let s=0; const reasons=[];
  if(ind.kd&&ind.kd.lowZone&&ind.kd.goldenCross){s+=2.5;reasons.push("KD低檔金叉");}
  if(ind.rsi&&ind.rsi<40&&ind.rsi>25){s+=1.5;reasons.push("RSI低檔回升");}
  if(ind.macd&&ind.macd.goldenCross){s+=2;reasons.push("MACD底部金叉");}
  if(ind.boll&&ind.boll.pctB<0.3){s+=1;reasons.push("貼近布林下軌");}
  if(ind.volR&&ind.volR>=1.5){s+=1.5;reasons.push("帶量止跌");}
  if(ind.chg1!=null&&ind.chg1>2){s+=1;reasons.push("今日轉強");}
  return {score:Math.max(0,s),reasons,max:9};
}
const SCORERS={hot:scoreHot,quality:scoreQuality,reversal:scoreReversal};

async function loadAllStockNames(){
  if(ALL_NAMES_LOADED) return;
  // 沒填 token 就只用內建清單（已在開場灌好），直接標記完成
  if(!finmindToken()){ ALL_NAMES_LOADED=true; return; }
  const params=new URLSearchParams({dataset:"TaiwanStockInfo"});
  params.append("token", finmindToken());
  try{
    const r=await fetch(`${FINMIND}?${params}`);
    const j=await r.json();
    if(j.status===200 && j.data){
      j.data.forEach(row=>{
        if(/^\d{4}$/.test(row.stock_id) && row.stock_name){
          const market=(row.type||"").toLowerCase();
          if(market!=="twse" && market!=="tpex") return;
          const ind=row.industry_category||"其他";
          if(/ETF|受益|存託/.test(ind)) return;
          ALL_NAMES[row.stock_id]=row.stock_name;
          // FinMind 有資料就用它（更完整），內建的當後備
          ALL_INFO[row.stock_id]={name:row.stock_name, market, industry:ind};
        }
      });
    }
  }catch(e){}
  ALL_NAMES_LOADED=true;
}

/* ---------- Gemini AI ---------- */
const GEMINI_URL="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent";
function buildPrompt(id,name,ind,mode){
  const f=(x,d=1)=>(x==null||isNaN(x))?"無":Number(x).toFixed(d);
  const macd=ind.macd?`DIF ${f(ind.macd.dif,2)}, 柱狀體 ${f(ind.macd.osc,2)}, ${ind.macd.goldenCross?"剛黃金交叉":ind.macd.deadCross?"剛死亡交叉":ind.macd.osc>0?"多方":"空方"}`:"資料不足";
  const kd=ind.kd?`K ${f(ind.kd.k)}, D ${f(ind.kd.d)}`:"資料不足";
  const ma=ind.ma?`MA5 ${f(ind.ma.ma5)}, MA20 ${f(ind.ma.ma20)}, MA60 ${f(ind.ma.ma60)}, ${ind.ma.bullish?"多頭排列":"非多頭"}`:"資料不足";
  const cat=STOCKS[id]?`，產業：${STOCKS[id].cat}（${STOCKS[id].desc}）`:"";
  return `你是務實的台股技術分析師。根據「${name}(${id})」${cat}的技術數據給簡潔中文分析。
股價 ${f(ind.lastClose,2)} 元（今日 ${f(ind.chg1)}%，近5日 ${f(ind.chg5)}%）
量能：當日量為20日均量 ${f(ind.volR)} 倍
MACD：${macd}
RSI(14)：${f(ind.rsi)}　KD(9)：${kd}
均線：${ma}，股價${ind.ma&&ind.ma.aboveAll?"站上所有均線":"未站上所有均線"}
布林位置：${ind.boll?f(ind.boll.pctB*100)+"%":"無"}　20日突破：${ind.breakout?"是":"否"}
近20日漲跌：${f(ind.chg20)}%　近20日振幅：${f(ind.amplitude)}%（越大越會跳）
距52週高 ${f(ind.fromHigh)}%、距52週低 +${f(ind.fromLow)}%
參考支撐 ${f(ind.support,1)}、參考壓力 ${f(ind.resistance,1)}
方向：${MODE_LABEL[mode]||"綜合"}
大盤環境：${MARKET?`${MARKET.label}（${MARKET.light==="green"?"站上月線季線多頭":MARKET.light==="red"?"跌破季線空頭":"多空交戰"}），請把大盤方向納入研判，逆勢時提醒風險`:"未知"}

這是「盤後復盤」分析，資料為當日收盤，目的是為明天進場做準備。
用此格式，每段2-3句白話具體：
今日表現：（這檔今天收盤後的技術狀態，多方或空方）
明日觀察：（明天開盤後該盯什麼——關鍵價位、若突破/跌破某價代表什麼、量能要看多少）
進場準備：（如果明天要進場，建議的進場參考價、停損價、目標價，以及該等什麼訊號確認再動手）
務必誠實，訊號矛盾就直說，不保證上漲不喊買賣，這是研究非投資建議。220字內。`;
}
async function geminiAnalyze(id,name,ind,mode){
  const key=geminiKey();
  if(!key) throw new Error("尚未填入 Gemini API Key，請在程式碼最上方 MY_GEMINI_KEY 填入。");
  const body={contents:[{parts:[{text:buildPrompt(id,name,ind,mode)}]}],
    generationConfig:{temperature:0.4,maxOutputTokens:400}};
  const r=await fetch(`${GEMINI_URL}?key=${key}`,{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){ if(r.status===429)throw new Error("Gemini 用量達上限，請稍後再試。");
    throw new Error(`AI 分析失敗 (${r.status})`); }
  const j=await r.json();
  return j?.candidates?.[0]?.content?.parts?.[0]?.text || "AI 沒有回傳內容，請重試。";
}

async function runScan(){
  if(activeModes.size===0){toast("請至少選一個方向");return;}
  const universe = scanRange==="all"?universeAll():universeHot();
  const prog=$("#progress");prog.classList.add("show");
  const fill=$("#barFill"),ptxt=$("#ptxt"),grid=$("#scanGrid");grid.innerHTML="";
  $("#scanBtn").disabled=true;
  const scored=[];
  for(let i=0;i<universe.length;i++){
    const id=universe[i];
    ptxt.textContent=`分析 ${id} ${stockName(id)}（${i+1}/${universe.length}）`;
    fill.style.width=`${(i+1)/universe.length*100}%`;
    try{
      const p=await fetchPrice(id,150); const ind=computeIndicators(p);
      let best=null;
      for(const m of activeModes){const r=SCORERS[m](ind);const norm=r.score/r.max;
        if(!best||norm>best.norm)best={mode:m,...r,norm};}
      if(best&&best.score>0)scored.push({id,name:stockName(id),cat:stockCat(id),ind,...best});
    }catch(e){}
    await new Promise(r=>setTimeout(r,110));
  }
  scored.sort((a,b)=>b.norm-a.norm);
  lastResults=scored.slice(0,18);
  prog.classList.remove("show");$("#scanBtn").disabled=false;
  renderCards(lastResults,"#scanGrid");
}
function scoreColor(n){return n>=0.7?"var(--up)":n>=0.45?"var(--gold)":"var(--ink-dim)";}
function renderCards(list,sel,showDel=false){

  if(!list.length){grid.innerHTML=`<div class="empty">沒有明顯符合的標的。<br>可換方向或擴大範圍再試。</div>`;return;}

  list.forEach(st=>{

    const card=document.createElement("div");
    card.className="card"+(isHot&&st.norm>=0.6?" hot":"")+(showDel?" watch-card":"");
    const delBtn=showDel?`<button class="del-btn" data-del="${st.id}">✕</button>`:"";
    // 飆股候選依大盤標順勢/逆勢

          <div class="watch-meta"><span class="cat-tag">${st.cat||""}</span>${badge}</div></div></div>
        <div class="score-bar"><div class="num mono" style="color:${scoreColor(st.norm)}">${pct}</div>

            <div class="cat-tag">${st.cat||""}</div></div>

let heatmapLoaded=false;
function heatColor(pct){
  if(pct==null) return "#1b2330";
  const x=Math.max(-8,Math.min(8,pct))/8;
  if(x>=0){ const a=0.15+x*0.55; return `rgba(255,77,109,${a.toFixed(2)})`; }
  else { const a=0.15+(-x)*0.55; return `rgba(22,214,163,${a.toFixed(2)})`; }
}
async function renderHeatmap(){
  const box=$("#heatmapBox");
  box.style.display="block";
  box.innerHTML=`<div class="empty" style="padding:30px;"><span class="spinner"></span><br>計算各產業近期漲幅…</div>`;
  const byInd={};
  Object.keys(ALL_INFO).forEach(id=>{const ind=ALL_INFO[id].industry;(byInd[ind]=byInd[ind]||[]).push(id);});
  const industries=Object.keys(byInd);
  const results=[];
  for(const ind of industries){
    const sample=byInd[ind].slice(0,3);
    const chgs=[];
    for(const id of sample){
      try{ const p=await fetchPrice(id,40); const c=p.closes;
        if(c.length>=21) chgs.push((c.at(-1)/c.at(-21)-1)*100);
      }catch(e){}
      await new Promise(r=>setTimeout(r,90));
    }
    if(chgs.length){ const avg=chgs.reduce((a,b)=>a+b,0)/chgs.length;
      results.push({ind, avg, count:byInd[ind].length}); }
  }
  results.sort((a,b)=>b.avg-a.avg);
  if(!results.length){ box.innerHTML=`<div class="chain-note">需要 FinMind token 才能計算熱力圖。</div>`; return; }
  heatmapLoaded=true;
  const tiles=results.map(r=>`
    <div class="heat-tile" style="background:${heatColor(r.avg)}" data-ind="${r.ind}">
      <div class="heat-name">${r.ind}</div>
      <div class="heat-pct mono">${r.avg>=0?"+":""}${r.avg.toFixed(1)}%</div>
      <div class="heat-cnt">${r.count}檔</div></div>`).join("");
  box.innerHTML=`<div class="heat-head">近20日產業表現（紅熱綠冷，點磚進該產業）</div>
    <div class="heat-grid">${tiles}</div>
    <div class="heat-note">取每產業代表股估算，僅供研判資金流向參考。</div>`;
  box.querySelectorAll(".heat-tile").forEach(t=>{
    t.onclick=()=>{const ind=t.dataset.ind;
      const inTwse=Object.keys(ALL_INFO).some(id=>ALL_INFO[id].market==="twse"&&ALL_INFO[id].industry===ind);
      openIndustry(inTwse?"twse":"tpex", ind);};
  });
}
$("#heatmapBtn") && ($("#heatmapBtn").onclick=()=>{
  const box=$("#heatmapBox");
  if(box.style.display==="block" && heatmapLoaded){ box.style.display="none"; return; }
  renderHeatmap();
});

async function openCategoryFallback(cat){
  $("#catList").style.display="none";$("#catDetail").style.display="block";
  $("#catBack").style.display="flex";$("#catTitle").textContent=cat;
  const ids=Object.keys(STOCKS).filter(id=>STOCKS[id].cat===cat);

  grid.innerHTML=`<div class="empty"><span class="spinner"></span><br>計算 ${cat} 指標…</div>`;
  const list=[];
  for(const id of ids){
    try{
      const p=await fetchPrice(id,150);const ind=computeIndicators(p);
      let best=null;
      for(const m of ["hot","quality","reversal"]){const r=SCORERS[m](ind);const norm=r.score/r.max;
        if(!best||norm>best.norm)best={mode:m,...r,norm};}
      list.push({id,name:stockName(id),cat,ind,...best});
    }catch(e){ list.push({id,name:stockName(id),cat,ind:null,mode:"quality",norm:0,score:0,reasons:[STOCKS[id].desc]}); }

  }
  list.sort((a,b)=>b.norm-a.norm);
  renderCards(list,"#catStocks");
}

async function runSingle(forceId){
  const raw=(forceId||$("#sidInput").value).trim();
  // 若輸入的是股名或不完整，嘗試從建議找出第一個符合的代碼
  let id=raw;
  if(!/^\d{4}$/.test(id)){
    const matches=searchStocks(raw);
    if(matches.length){ id=matches[0].id; $("#sidInput").value=id; }
    else { toast("找不到符合的股票，請輸入4位數代碼或股名"); return; }
  }
  hideSuggest();
  const grid=$("#singleResult");
  grid.innerHTML=`<div class="empty"><span class="spinner"></span><br>抓取 ${id} ${stockName(id)} 資料並計算指標…</div>`;
  try{
    if(!ALL_NAMES_LOADED) await loadAllStockNames();
    const p=await fetchPrice(id,150);const ind=computeIndicators(p);
    let best=null;
    for(const m of ["hot","quality","reversal"]){const r=SCORERS[m](ind);const norm=r.score/r.max;
      if(!best||norm>best.norm)best={mode:m,...r,norm};}
    const st={id,name:stockName(id),cat:stockCat(id),ind,...best};
    renderCards([st],"#singleResult");
    $("#singleResult").querySelector(".card").onclick=()=>openDetail(st);
    openDetail(st);
  }catch(e){grid.innerHTML=`<div class="empty">查無 ${id} 的資料，請確認代碼正確（支援上市櫃4碼）。<br>${e.message}</div>`;}
}

/* ---------- 自動建議（邊打邊跳出符合的股票）---------- */
// 整合所有已知股票來源，建一張搜尋用的表
function allKnownStocks(){
  const map={};
  // 內建精選（有產業）
  if(typeof STOCKS!=="undefined") Object.keys(STOCKS).forEach(id=>{map[id]={id,name:STOCKS[id].name};});
  // 內建清單
  if(typeof STOCK_LIST!=="undefined") Object.keys(STOCK_LIST).forEach(id=>{if(!map[id])map[id]={id,name:STOCK_LIST[id][0]};});
  // 全市場（有 token 載入後）
  Object.keys(ALL_INFO).forEach(id=>{if(!map[id])map[id]={id,name:ALL_INFO[id].name};});
  return Object.values(map);
}

function searchStocks(q){
  q=(q||"").trim();
  if(!q) return [];
  const all=allKnownStocks();
  const isNum=/^\d+$/.test(q);
  let res;
  if(isNum){
    // 數字：代碼開頭符合（打23 → 23XX）
    res=all.filter(s=>s.id.startsWith(q));
    res.sort((a,b)=>a.id.localeCompare(b.id));
  } else {
    // 文字：股名包含
    res=all.filter(s=>s.name && s.name.includes(q));
    res.sort((a,b)=>a.id.localeCompare(b.id));
  }
  return res.slice(0,30); // 最多30筆，避免太長
}

let suggestActiveIdx=-1;
function renderSuggest(q){
  const box=$("#suggestBox");
  const list=searchStocks(q);
  suggestActiveIdx=-1;
  if(!list.length || !q){ hideSuggest(); return; }
  box.innerHTML=list.map((s,i)=>`
    <div class="suggest-item" data-id="${s.id}">
      <span class="sg-id mono">${s.id}</span>
      <span class="sg-name">${s.name||""}</span>
      <span class="sg-cat">${stockCat(s.id)||""}</span>
    </div>`).join("");
  box.style.display="block";
  box.querySelectorAll(".suggest-item").forEach(it=>{
    it.onclick=()=>{ const id=it.dataset.id; $("#sidInput").value=id; hideSuggest(); runSingle(id); };
  });
}
function hideSuggest(){ const b=$("#suggestBox"); if(b){b.style.display="none";b.innerHTML="";} }

// 邊打邊建議（去抖動，避免太頻繁）
let suggestTimer=null;
$("#sidInput").addEventListener("input",function(){
  const q=this.value;
  clearTimeout(suggestTimer);
  suggestTimer=setTimeout(()=>renderSuggest(q),120);
});
// 點輸入框外面收起建議
document.addEventListener("click",e=>{

});

    const riskBoxes=[
      ["近20日振幅", ind.amplitude?f(ind.amplitude)+"%":"-"],

      ["距52週高", f(ind.fromHigh)+"%"],
      ["距52週低", "+"+f(ind.fromLow)+"%"],
      ["52週高", f(ind.hi52,1)],
      ["52週低", f(ind.lo52,1)],
      ["連續動能", streakTxt],
      ["量能溫度", ind.volR?(ind.volR>=2?"🔥爆量":ind.volR>=1.3?"溫熱":ind.volR<0.7?"❄️窒息":"正常"):"-"],
    ];

/* ---------- 同類股比較 ---------- */
async function renderPeers(st){
  const box=$("#dPeers");
  const ind=stockCat(st.id);
  if(!ind){ box.innerHTML=""; return; }
  // 找同產業股票（最多取10檔，含自己）
  let peers=Object.keys(ALL_INFO).filter(id=>ALL_INFO[id].industry===ind);
  if(peers.length<2){ box.innerHTML=`<div class="sec-title">同類股比較</div><div class="chain-note">此產業收錄股票不足，無法比較。</div>`; return; }
  if(peers.length>10){
    // 太多時，確保含自己，其餘取前面的
    peers=peers.filter(id=>id!==st.id).slice(0,9); peers.unshift(st.id);
  }
  box.innerHTML=`<div class="sec-title">同類股比較（${ind}）</div>
    <div class="chain-note" id="peersLoading"><span class="spinner"></span> 計算同類股評分…</div>`;
  const list=[];
  for(const id of peers){
    try{
      const p=await fetchPrice(id,150);const ind2=computeIndicators(p);
      let best=null;
      for(const m of ["hot","quality","reversal"]){const r=SCORERS[m](ind2);const norm=r.score/r.max;
        if(!best||norm>best.norm)best={mode:m,norm};}
      list.push({id,name:stockName(id),norm:best.norm});
    }catch(e){}
    await new Promise(r=>setTimeout(r,90));
  }
  if(!list.length){ box.innerHTML=`<div class="sec-title">同類股比較</div><div class="chain-note">需 FinMind token 才能比較同類股。</div>`; return; }
  list.sort((a,b)=>b.norm-a.norm);
  const myRank=list.findIndex(x=>x.id===st.id)+1;
  const rows=list.map((x,i)=>{
    const pct=Math.round(x.norm*100);
    const isMe=x.id===st.id;
    return `<div class="peer-row${isMe?" me":""}">
      <span class="peer-rank">${i+1}</span>
      <span class="peer-name">${x.name} <span class="peer-id mono">${x.id}</span>${isMe?' <span class="peer-tag">本檔</span>':''}</span>
      <span class="peer-bar"><span class="peer-fill" style="width:${pct}%;background:${scoreColor(x.norm)}"></span></span>
      <span class="peer-score mono" style="color:${scoreColor(x.norm)}">${pct}</span></div>`;
  }).join("");
  const rankTxt = myRank===1 ? "🏆 是同類最強" : myRank<=3 ? `名列前茅（第 ${myRank} 名）` : `在同類中排第 ${myRank} 名`;
  box.innerHTML=`<div class="sec-title">同類股比較（${ind}）</div>
    <div class="chain-note" style="margin-bottom:10px;">本檔 ${st.name} ${rankTxt}，共比較 ${list.length} 檔。挑強勢股優先看排前面的。</div>
    <div class="peer-list">${rows}</div>`;
  box.querySelectorAll(".peer-row").forEach(rw=>{
    const nm=rw.querySelector(".peer-id"); if(!nm)return;
    rw.style.cursor="pointer";
    rw.onclick=()=>{ const cid=nm.textContent.trim(); if(cid===st.id)return;
      closeDetail(); setTimeout(()=>{switchTab("single");$("#sidInput").value=cid;runSingle();},250); };
  });
}
function renderChain(id){
  const c=SUPPLY_CHAIN[id];
  if(!c) return `<div class="sec-title">供應鏈</div><div class="chain-note">此股暫無收錄供應鏈關係圖。已收錄者如台積電(2330)、聯發科(2454)、奇鋐(3017)、廣達(2382)、鴻海(2317)、欣興(3037)。</div>`;
  const item=(x)=>`<div class="chain-item" data-cid="${x.id}"><span class="ci-name">${stockName(x.id)} ${x.id}</span><span class="ci-rel">${x.rel}</span></div>`;
  let html=`<div class="sec-title">上下游供應鏈</div><div class="chain-wrap">`;
  html+=`<div class="chain-note">${c.note}</div>`;
  if(c.upstream&&c.upstream.length){
    html+=`<div class="chain-tier"><div class="chain-label up">▲ 上游（供應商）</div><div class="chain-items">${c.upstream.map(item).join("")}</div></div>`;
    html+=`<div class="chain-arrow">↓</div>`;
  }
  html+=`<div class="chain-tier"><div class="chain-self">● ${stockName(id)}（${c.role}）</div></div>`;
  if(c.downstream&&c.downstream.length){
    html+=`<div class="chain-arrow">↓</div>`;
    html+=`<div class="chain-tier"><div class="chain-label down">▼ 下游（客戶／採用者）</div><div class="chain-items">${c.downstream.map(item).join("")}</div></div>`;
  }
  html+=`</div>`;
  return html;
}
function bindChainClicks(){
  document.querySelectorAll(".chain-item").forEach(el=>{
    el.onclick=async()=>{
      const cid=el.dataset.cid;
      $("#sheet").classList.remove("open");$("#sheetBg").classList.remove("open");
      await new Promise(r=>setTimeout(r,250));
      switchTab("single");$("#sidInput").value=cid;runSingle();
    };
  });
}

function closeDetail(){$("#sheet").classList.remove("open");$("#sheetBg").classList.remove("open");}
